{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>reviews</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-surface: #161b22;
            --bg-card: #1c2128;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --text-dim: #6e7681;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --blue: #58a6ff;
            --border: #30363d;
            --link: #58a6ff;
        }
        [data-theme="light"] {
            --bg: #f6f8fa;
            --bg-surface: #ffffff;
            --bg-card: #f6f8fa;
            --text: #1f2328;
            --text-muted: #656d76;
            --text-dim: #8b949e;
            --green: #1a7f37;
            --red: #cf222e;
            --yellow: #9a6700;
            --blue: #0969da;
            --border: #d0d7de;
            --link: #0969da;
        }
        @media (prefers-color-scheme: light) {
            :root:not([data-theme="dark"]) {
                --bg: #f6f8fa;
                --bg-surface: #ffffff;
                --bg-card: #f6f8fa;
                --text: #1f2328;
                --text-muted: #656d76;
                --text-dim: #8b949e;
                --green: #1a7f37;
                --red: #cf222e;
                --yellow: #9a6700;
                --blue: #0969da;
                --border: #d0d7de;
                --link: #0969da;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-surface);
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .btn {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn:hover { border-color: var(--text-dim); }
        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }
        main { max-width: 1100px; margin: 0 auto; padding: 24px; }
        .section { margin-bottom: 32px; }
        .section-header {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .section-header .count { font-weight: 400; }
        .ticket-group {
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            background: var(--bg-surface);
        }
        .ticket-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .ticket-key {
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-weight: 600;
            color: var(--blue);
        }
        .ticket-meta { color: var(--text-muted); }
        .ticket-activity {
            margin-left: auto;
            color: var(--text-dim);
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 12px;
        }
        .pr-row {
            display: grid;
            grid-template-columns: 90px 1fr auto;
            grid-template-rows: auto auto;
            gap: 1px 12px;
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
        }
        .pr-row:last-child { border-bottom: none; }
        .pr-row:hover { background: var(--bg-card); }
        .pr-repo {
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 12px;
            color: var(--text-muted);
            grid-row: 1 / 3;
            align-self: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .pr-title-line {
            display: flex;
            align-items: baseline;
            gap: 6px;
            min-width: 0;
        }
        .pr-number {
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 13px;
            color: var(--text-dim);
            flex-shrink: 0;
        }
        .pr-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pr-right {
            grid-row: 1 / 3;
            align-self: center;
            text-align: right;
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 12px;
            color: var(--text-dim);
        }
        .pr-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .pr-author { display: flex; align-items: center; gap: 4px; }
        .avatar { width: 16px; height: 16px; border-radius: 50%; }
        .ci-pass { color: var(--green); }
        .ci-fail { color: var(--red); }
        .ci-pending { color: var(--yellow); }
        .your-pr-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
        }
        .your-pr-row:last-child { border-bottom: none; }
        .your-pr-row:hover { background: var(--bg-card); }
        .badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            flex-shrink: 0;
            font-weight: 500;
        }
        .badge-approved { background: rgba(63,185,80,0.15); color: var(--green); }
        .badge-changes { background: rgba(210,153,34,0.15); color: var(--yellow); }
        .badge-waiting { background: rgba(139,148,158,0.1); color: var(--text-dim); }
        .your-pr-repo {
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 12px;
            color: var(--text-muted);
            flex-shrink: 0;
            width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .your-pr-number {
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 13px;
            color: var(--text-dim);
            flex-shrink: 0;
        }
        .your-pr-title {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .your-pr-time {
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 12px;
            color: var(--text-dim);
            flex-shrink: 0;
        }
        .subsection-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            padding: 6px 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }
        .empty-state {
            text-align: center;
            padding: 32px;
            color: var(--text-dim);
            font-size: 14px;
        }
        .filters {
            display: none;
            padding: 10px 24px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters.open { display: flex; }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .filter-group label { cursor: pointer; }
        .footer {
            padding: 12px 24px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-dim);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>reviews</h1>
        <div class="header-actions">
            <button class="btn" onclick="doSync()" id="sync-btn">Refresh</button>
            <button class="btn" onclick="toggleFilters()">Filters</button>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#9681;</button>
        </div>
    </div>
    <div class="filters" id="filters">
        <div class="filter-group">
            <input type="checkbox" id="f-ci" onchange="saveFilters()">
            <label for="f-ci">Hide failing CI</label>
        </div>
        <div class="filter-group">
            <input type="checkbox" id="f-approved" onchange="saveFilters()">
            <label for="f-approved">Hide approved</label>
        </div>
        <div class="filter-group">
            <input type="checkbox" id="f-drafts" checked onchange="saveFilters()">
            <label for="f-drafts">Hide drafts</label>
        </div>
    </div>
    {{template "content" .}}
    <div class="footer">
        {{if .LastSync}}synced {{reltime .LastSync}} &middot; {{end}}{{.TotalPRs}} open PRs across {{.TotalRepos}} repos
    </div>
    <script>
    (function(){
        var LS = localStorage;
        function getTheme(){ return LS.getItem('reviews-theme')||'auto'; }
        function setTheme(t){
            LS.setItem('reviews-theme',t);
            if(t==='auto') document.documentElement.removeAttribute('data-theme');
            else document.documentElement.setAttribute('data-theme',t);
        }
        window.toggleTheme = function(){
            var cur = getTheme();
            var isDark = cur==='dark'||(cur==='auto'&&matchMedia('(prefers-color-scheme:dark)').matches);
            setTheme(isDark?'light':'dark');
        };
        setTheme(getTheme());

        window.doSync = function(){
            var btn=document.getElementById('sync-btn');
            btn.textContent='Syncing...'; btn.disabled=true;
            fetch('/api/sync',{method:'POST'})
                .then(function(r){
                    if(r.ok) location.reload();
                    else r.text().then(function(t){ btn.textContent='Failed'; setTimeout(function(){ btn.textContent='Refresh'; btn.disabled=false; },2000); });
                })
                .catch(function(){ btn.textContent='Failed'; setTimeout(function(){ btn.textContent='Refresh'; btn.disabled=false; },2000); });
        };
        window.toggleFilters = function(){
            document.getElementById('filters').classList.toggle('open');
        };
        function loadFilters(){
            try{
                var f=JSON.parse(LS.getItem('reviews-filters')||'{}');
                document.getElementById('f-ci').checked=!!f.ci;
                document.getElementById('f-approved').checked=!!f.approved;
                document.getElementById('f-drafts').checked=f.drafts!==false;
            }catch(e){}
            applyFilters();
        }
        window.saveFilters = function(){
            var f={
                ci:document.getElementById('f-ci').checked,
                approved:document.getElementById('f-approved').checked,
                drafts:document.getElementById('f-drafts').checked
            };
            LS.setItem('reviews-filters',JSON.stringify(f));
            applyFilters();
        };
        function applyFilters(){
            var ci=document.getElementById('f-ci').checked;
            var approved=document.getElementById('f-approved').checked;
            var drafts=document.getElementById('f-drafts').checked;
            document.querySelectorAll('[data-ci]').forEach(function(el){
                var hide=false;
                if(ci&&(el.dataset.ci==='failure'||el.dataset.ci==='error')) hide=true;
                if(approved&&el.dataset.bucket==='approved') hide=true;
                if(drafts&&el.dataset.draft==='true') hide=true;
                el.style.display=hide?'none':'';
            });
        }
        loadFilters();
    })();
    </script>
</body>
</html>
{{end}}
