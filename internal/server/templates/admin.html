{{define "admin"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>reviews admin</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-surface: #161b22;
            --bg-card: #1c2128;
            --bg-hover: #1f252d;
            --text: #e6edf3;
            --text-secondary: #b1bac4;
            --text-muted: #8b949e;
            --text-dim: #6e7681;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --border: #30363d;
            --border-subtle: #21262d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--bg-surface);
        }
        .header h1 { font-size: 16px; font-weight: 600; }
        .header a { color: var(--blue); text-decoration: none; font-size: 13px; }
        main { max-width: 900px; margin: 0 auto; padding: 20px 24px; }
        .section { margin-bottom: 28px; }
        .section-header {
            font-size: 12px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.06em; color: var(--text-muted);
            margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
        }
        .card {
            border: 1px solid var(--border); border-radius: 8px;
            background: var(--bg-surface); padding: 12px 16px; margin-bottom: 8px;
        }
        .card-header { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
        .member-list { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .member-tag {
            font-size: 12px; padding: 2px 8px; border-radius: 12px;
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary);
            display: flex; align-items: center; gap: 4px;
        }
        .member-tag .remove {
            cursor: pointer; color: var(--text-dim); font-size: 14px; line-height: 1;
        }
        .member-tag .remove:hover { color: var(--red); }
        .inline-form { display: flex; gap: 4px; align-items: center; }
        input[type="text"], select {
            font-size: 12px; padding: 4px 8px; border-radius: 4px;
            border: 1px solid var(--border); background: var(--bg-card); color: var(--text); width: 160px;
        }
        select { width: auto; }
        .btn {
            background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border);
            padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500;
        }
        .btn:hover { border-color: var(--text-dim); color: var(--text); }
        .btn-danger:hover { border-color: var(--red); color: var(--red); }
        .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
        .btn-primary:hover { opacity: 0.9; }
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-dim); text-align: left; padding: 4px 8px; border-bottom: 1px solid var(--border); }
        td { font-size: 13px; padding: 5px 8px; border-bottom: 1px solid var(--border-subtle); }
        .login-box { max-width: 300px; margin: 100px auto; text-align: center; }
        .login-box input { width: 100%; margin-bottom: 8px; }
        .status { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .status.error { color: var(--red); }
        .status.success { color: var(--green); }
    </style>
</head>
<body>
    <div class="header">
        <h1>reviews admin</h1>
        <a href="/">back to dashboard</a>
    </div>

    {{if not .Authed}}
    <main>
        <div class="login-box">
            <h2 style="margin-bottom:12px; font-size:16px">Admin Login</h2>
            <input type="password" id="token-input" placeholder="Admin token" onkeydown="if(event.key==='Enter')loginAdmin()">
            <button class="btn btn-primary" onclick="loginAdmin()" style="width:100%">Login</button>
            <div class="status error" id="login-error" style="display:none">Invalid token</div>
        </div>
    </main>
    <script>
    function loginAdmin(){
        var token = document.getElementById('token-input').value.trim();
        if(!token) return;
        fetch('/api/admin/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({token: token})
        }).then(function(r){
            if(r.ok){ location.href = '/admin'; }
            else { document.getElementById('login-error').style.display = ''; }
        });
    }
    </script>
    {{else}}
    <main>
        <section class="section">
            <h2 class="section-header">Teams</h2>
            <div id="teams-container">
            {{range .Teams}}
                <div class="card" id="team-{{.}}">
                    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
                        <span>{{.}}</span>
                        <button class="btn btn-danger" onclick="deleteTeam('{{.}}')">Delete Team</button>
                    </div>
                    <div class="member-list" id="members-{{.}}">
                    {{$team := .}}
                    {{range index $.Memberships .}}
                        <span class="member-tag">{{.}} <span class="remove" onclick="removeMember('{{$team}}','{{.}}')">&times;</span></span>
                    {{end}}
                    </div>
                    <div class="inline-form">
                        <div style="position:relative">
                            <input type="text" placeholder="Search GitHub user..." autocomplete="off" id="add-member-{{.}}" oninput="filterMemberDropdown('{{.}}')" onfocus="filterMemberDropdown('{{.}}')">
                            <div id="mdd-{{.}}" class="member-dropdown" style="display:none;position:absolute;top:100%;left:0;width:200px;background:var(--bg-surface);border:1px solid var(--border);border-radius:4px;max-height:180px;overflow-y:auto;z-index:50;margin-top:2px"></div>
                        </div>
                        <button class="btn" onclick="addMember('{{.}}')">Add Member</button>
                    </div>
                </div>
            {{end}}
            </div>
            <div class="inline-form" style="margin-top:8px">
                <input type="text" id="new-team-name" placeholder="Team name">
                <button class="btn btn-primary" onclick="createTeam()">Create Team</button>
            </div>
        </section>

        <section class="section">
            <h2 class="section-header">Slack Mappings</h2>
            <table>
                <thead>
                    <tr><th>GitHub User</th><th>Slack User</th><th>Timezone</th><th></th></tr>
                </thead>
                <tbody id="slack-body"></tbody>
            </table>
        </section>
    </main>
    <script>
    (function(){
        function api(method, url, body){
            var opts = {method:method, headers:{'Content-Type':'application/json'}, credentials:'same-origin'};
            if(body) opts.body = JSON.stringify(body);
            return fetch(url, opts);
        }
        function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        var allGithubUsers = [];
        var allSlackUsers = [];
        var existingMappings = {}; // github_username -> {SlackUserID, Timezone}

        // Load everything then render
        Promise.all([
            fetch('/api/admin/github/users', {credentials:'same-origin'}).then(function(r){ return r.json(); }),
            fetch('/api/admin/slack/users', {credentials:'same-origin'}).then(function(r){ return r.json(); }),
            fetch('/api/admin/slack/mappings', {credentials:'same-origin'}).then(function(r){ return r.json(); })
        ]).then(function(results){
            allGithubUsers = results[0] || [];
            allSlackUsers = results[1] || [];
            (results[2] || []).forEach(function(m){ existingMappings[m.GithubUsername] = m; });
            renderMappingsTable(allGithubUsers);
        });

        var TIMEZONES = [
            {v:'America/New_York', l:'Eastern'},
            {v:'America/Chicago', l:'Central'},
            {v:'America/Denver', l:'Mountain'},
            {v:'America/Los_Angeles', l:'Pacific'},
            {v:'UTC', l:'UTC'}
        ];

        function renderMappingsTable(ghUsers){
            var tbody = document.getElementById('slack-body');
            tbody.innerHTML = '';
            ghUsers.forEach(function(gh){
                var m = existingMappings[gh];
                var row = document.createElement('tr');
                row.id = 'row-'+gh;

                // GitHub user cell
                var tdGh = document.createElement('td');
                tdGh.textContent = gh;
                row.appendChild(tdGh);

                // Slack user cell — searchable input
                var tdSlack = document.createElement('td');
                var slackLabel = m ? slackLabelForID(m.SlackUserID) : '';
                tdSlack.innerHTML =
                    '<div style="position:relative">'+
                    '<input type="text" data-gh="'+esc(gh)+'" placeholder="Search Slack user..." autocomplete="off"'+
                    ' value="'+esc(slackLabel)+'" style="width:200px"'+
                    ' oninput="filterRowDropdown(this)" onfocus="openRowDropdown(this)">'+
                    '<input type="hidden" id="sid-'+esc(gh)+'" value="'+esc(m ? m.SlackUserID : '')+'">'+
                    '<div id="dd-'+esc(gh)+'" style="display:none;position:absolute;top:100%;left:0;width:240px;background:var(--bg-surface);border:1px solid var(--border);border-radius:4px;max-height:180px;overflow-y:auto;z-index:50;margin-top:2px"></div>'+
                    '</div>';
                row.appendChild(tdSlack);

                // Timezone cell
                var tdTz = document.createElement('td');
                var tzSel = document.createElement('select');
                TIMEZONES.forEach(function(tz){
                    var opt = document.createElement('option');
                    opt.value = tz.v; opt.textContent = tz.l;
                    if(m && m.Timezone === tz.v) opt.selected = true;
                    tzSel.appendChild(opt);
                });
                tzSel.id = 'tz-'+gh;
                tdTz.appendChild(tzSel);
                row.appendChild(tdTz);

                // Timezone change triggers dirty check
                tzSel.onchange = function(){ checkDirty(gh); };

                // Actions cell
                var tdAct = document.createElement('td');
                tdAct.style.whiteSpace = 'nowrap';
                var saveBtn = document.createElement('button');
                saveBtn.className = 'btn btn-primary';
                saveBtn.textContent = 'Save Mapping';
                saveBtn.style.display = 'none';
                saveBtn.onclick = function(){ saveMapping(gh); };
                tdAct.appendChild(saveBtn);
                if(m){
                    var clearBtn = document.createElement('button');
                    clearBtn.className = 'btn btn-danger';
                    clearBtn.textContent = '\u00d7';
                    clearBtn.title = 'Clear mapping';
                    clearBtn.style.marginLeft = '4px';
                    clearBtn.onclick = function(){ clearMapping(gh); };
                    tdAct.appendChild(clearBtn);
                }
                row.appendChild(tdAct);

                tbody.appendChild(row);
            });
        }

        function slackLabelForID(id){
            for(var i=0; i<allSlackUsers.length; i++){
                if(allSlackUsers[i].ID === id) return allSlackUsers[i].DisplayName || allSlackUsers[i].RealName;
            }
            return id;
        }

        window.openRowDropdown = function(input){
            renderRowDropdown(input, input.value);
            document.getElementById('dd-'+input.dataset.gh).style.display = '';
        };
        window.filterRowDropdown = function(input){
            document.getElementById('sid-'+input.dataset.gh).value = '';
            checkDirty(input.dataset.gh);
            renderRowDropdown(input, input.value);
            document.getElementById('dd-'+input.dataset.gh).style.display = '';
        };

        function checkDirty(gh){
            var sid = document.getElementById('sid-'+gh).value;
            var tz = document.getElementById('tz-'+gh).value;
            var m = existingMappings[gh];
            var dirty = sid !== (m ? m.SlackUserID : '') || tz !== (m ? m.Timezone : 'America/New_York');
            var btn = document.querySelector('#row-'+CSS.escape(gh)+' .btn-primary');
            if(btn) btn.style.display = dirty ? '' : 'none';
        }
        function renderRowDropdown(input, q){
            var gh = input.dataset.gh;
            var dd = document.getElementById('dd-'+gh);
            var filtered = q
                ? allSlackUsers.filter(function(u){
                    return (u.DisplayName||'').toLowerCase().includes(q.toLowerCase()) ||
                           (u.RealName||'').toLowerCase().includes(q.toLowerCase());
                  })
                : allSlackUsers;
            dd.innerHTML = '';
            filtered.slice(0,50).forEach(function(u){
                var label = u.DisplayName || u.RealName;
                var div = document.createElement('div');
                div.style.cssText = 'padding:4px 8px;cursor:pointer;font-size:12px;';
                div.textContent = label + (u.RealName && u.RealName !== label ? ' ('+u.RealName+')' : '');
                div.onmouseover = function(){ this.style.background='var(--bg-hover)'; };
                div.onmouseout = function(){ this.style.background=''; };
                div.onmousedown = function(e){
                    e.preventDefault();
                    input.value = label;
                    document.getElementById('sid-'+gh).value = u.ID;
                    dd.style.display = 'none';
                    checkDirty(gh);
                };
                dd.appendChild(div);
            });
        }
        document.addEventListener('click', function(e){
            if(!e.target.closest('[data-gh]') && !e.target.closest('[id^="dd-"]'))
                document.querySelectorAll('[id^="dd-"]').forEach(function(d){ d.style.display='none'; });
        });

        window.saveMapping = function(gh){
            var sid = document.getElementById('sid-'+gh).value.trim();
            var tz = document.getElementById('tz-'+gh).value;
            if(!sid) return;
            api('POST','/api/admin/slack',{github_username:gh,slack_user_id:sid,timezone:tz})
                .then(function(r){
                    if(r.ok){
                        existingMappings[gh] = {GithubUsername: gh, SlackUserID: sid, Timezone: tz};
                        var btn = document.querySelector('#row-'+CSS.escape(gh)+' .btn-primary');
                        btn.textContent = 'Saved!';
                        setTimeout(function(){
                            btn.textContent = 'Save Mapping';
                            btn.style.display = 'none';
                        }, 1500);
                    }
                });
        };

        window.clearMapping = function(gh){
            api('DELETE','/api/admin/slack?user='+encodeURIComponent(gh))
                .then(function(r){
                    if(r.ok){
                        delete existingMappings[gh];
                        // Re-render the row: clear inputs, remove X button
                        var input = document.querySelector('#row-'+CSS.escape(gh)+' [data-gh]');
                        if(input) input.value = '';
                        document.getElementById('sid-'+gh).value = '';
                        var xBtn = document.querySelector('#row-'+CSS.escape(gh)+' .btn-danger');
                        if(xBtn) xBtn.remove();
                        checkDirty(gh);
                    }
                });
        };

        // Team member searchable dropdown
        window.filterMemberDropdown = function(team){
            var input = document.getElementById('add-member-'+team);
            var dd = document.getElementById('mdd-'+team);
            var q = input.value.toLowerCase();
            var filtered = q
                ? allGithubUsers.filter(function(u){ return u.toLowerCase().includes(q); })
                : allGithubUsers;
            dd.innerHTML = '';
            filtered.slice(0,30).forEach(function(u){
                var div = document.createElement('div');
                div.style.cssText = 'padding:4px 8px;cursor:pointer;font-size:12px;';
                div.textContent = u;
                div.onmouseover = function(){ this.style.background='var(--bg-hover)'; };
                div.onmouseout = function(){ this.style.background=''; };
                div.onmousedown = function(e){
                    e.preventDefault();
                    input.value = u;
                    dd.style.display = 'none';
                };
                dd.appendChild(div);
            });
            dd.style.display = filtered.length ? '' : 'none';
        };
        document.addEventListener('click', function(e){
            if(!e.target.closest('.member-dropdown') && !e.target.matches('[id^="add-member-"]'))
                document.querySelectorAll('.member-dropdown').forEach(function(d){ d.style.display='none'; });
        });

        window.createTeam = function(){
            var name = document.getElementById('new-team-name').value.trim();
            if(!name) return;
            api('POST','/api/admin/team',{name:name}).then(function(){ location.reload(); });
        };
        window.deleteTeam = function(name){
            if(!confirm('Delete team "'+name+'"?')) return;
            api('DELETE','/api/admin/team?name='+encodeURIComponent(name)).then(function(){ location.reload(); });
        };
        window.addMember = function(team){
            var input = document.getElementById('add-member-'+team);
            var user = input.value.trim();
            if(!user) return;
            api('POST','/api/admin/team/member',{team:team,username:user}).then(function(){ location.reload(); });
        };
        window.removeMember = function(team, user){
            api('DELETE','/api/admin/team/member?team='+encodeURIComponent(team)+'&user='+encodeURIComponent(user)).then(function(){ location.reload(); });
        };
    })();
    </script>
    {{end}}
</body>
</html>
{{end}}
