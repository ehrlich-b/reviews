name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: GOOS=linux GOARCH=amd64 go build -o reviews-linux-amd64 ./cmd/reviews
      - uses: softprops/action-gh-release@v2
        with:
          files: reviews-linux-amd64
